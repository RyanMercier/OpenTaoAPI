services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - BITTENSOR_NETWORK=finney
      - CACHE_TTL_METAGRAPH=300
      - CACHE_TTL_PRICE=30
      - CACHE_TTL_DYNAMIC_INFO=120
      - CACHE_TTL_BALANCE=60
      - DATABASE_PATH=data/opentao.db
      - ARCHIVE_ENDPOINT=wss://archive.chain.opentensor.ai:443/
      - HISTORY_POLL_INTERVAL=1800
      # - SUBTENSOR_ENDPOINT=ws://your-node:9944
    restart: unless-stopped
