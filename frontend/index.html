<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenTaoAPI</title>
<link rel="stylesheet" href="/static/common.css">
<script src="/static/vendor/lightweight-charts.standalone.production.js"></script>
<style>

.search-form {
  display: flex;
  max-width: 480px;
  margin: 24px 0 16px;
}

.search-form input {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text-bright);
  font-family: var(--mono);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}

.search-form input::placeholder { color: var(--text-dim); }
.search-form input:focus { border-color: #333; }

.search-form button {
  padding: 8px 16px;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-left: none;
  color: var(--text-dim);
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
}

.search-form button:hover { color: var(--text); background: #181818; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 120px 20px;
  color: var(--text-dim);
}

.empty-state p { font-size: 15px; margin-bottom: 8px; }
.empty-state code {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-dim);
  background: var(--bg-raised);
  padding: 2px 6px;
}


/* Portfolio */
.portfolio { padding: 32px 0 64px; }

/* Portfolio history chart */
.portfolio-chart-card {
  margin: 0 0 28px;
  padding: 16px 16px 12px;
  background: var(--bg-raised);
  border: 1px solid var(--border);
}
.portfolio-chart-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 8px;
}
.portfolio-chart-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
}
.portfolio-chart-ranges { display: flex; gap: 4px; }
.portfolio-chart-ranges button {
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 8px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  cursor: pointer;
}
.portfolio-chart-ranges button:hover { color: var(--text); }
.portfolio-chart-ranges button.active {
  color: #001914;
  background: var(--accent);
  border-color: var(--accent);
}
.portfolio-chart-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--text-dim);
  font-size: 12px;
  gap: 8px;
}
.portfolio-chart-empty .btn { font-size: 11px; }
#portfolioChart { width: 100%; height: 200px; }

.coldkey-label {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 12px;
  word-break: break-all;
}

.balance-row {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 4px;
}

.balance-tao {
  font-family: var(--mono);
  font-size: 32px;
  font-weight: 600;
  color: var(--text-bright);
  letter-spacing: -1px;
}

.balance-usd {
  font-family: var(--mono);
  font-size: 16px;
  color: var(--text-dim);
}

.balance-breakdown {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 32px;
}

.balance-breakdown span { margin-right: 16px; }

/* Tokens table */
.tokens-header {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0;
}

.tokens-table {
  width: 100%;
  border-collapse: collapse;
}

.tokens-table th {
  text-align: right;
  font-weight: 400;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
}

.tokens-table th:first-child { text-align: left; }
.tokens-table th:hover { color: var(--text); }
.tokens-table th.sorted { color: var(--accent); }

.tokens-table td {
  text-align: right;
  font-family: var(--mono);
  font-size: 13px;
  padding: 10px 0;
  border-bottom: 1px solid #141414;
  color: var(--text);
}

.tokens-table td:first-child {
  text-align: left;
  font-family: var(--sans);
}

.tokens-table tr:hover td { background: #0d0d0d; }

.token-name {
  display: flex;
  align-items: center;
  gap: 8px;
}

.sn-badge {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  background: var(--bg-raised);
  border: 1px solid var(--border);
  padding: 1px 5px;
  white-space: nowrap;
}

.token-label {
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 140px;
}

.val-dim { color: var(--text-dim); }
.val-green { color: var(--accent); }

/* Free TAO row */
.free-row td { color: var(--text-dim); }

/* Responsive */
@media (max-width: 640px) {
  .balance-tao { font-size: 24px; }
  .balance-usd { font-size: 14px; }
  header .inner { flex-wrap: wrap; }
  .search-form { max-width: 100%; order: 2; }
  .tokens-table { font-size: 12px; }
  .token-label { max-width: 80px; }
}
</style>
</head>
<body>

<header>
  <div class="container inner">
    <a href="/" class="logo">Open<span>Tao</span>API</a>
    <div class="nav-links">
      <a href="/">Subnets</a>
      <a href="/portfolio" class="active">Portfolio</a>
      <a href="/wallets">Wallets</a>
      <a href="/paper">Paper</a>
      <a href="/webhooks">Webhooks</a>
      <a href="/docs">API Docs</a>
    </div>
  </div>
</header>

<main class="container">
  <form class="search-form" id="searchForm">
    <input type="text" id="coldkeyInput" placeholder="Enter coldkey SS58 address" spellcheck="false" autocomplete="off">
    <button type="submit">Lookup</button>
  </form>
  <div id="content">
    <div class="empty-state">
      <p>Enter a Bittensor coldkey to view portfolio</p>
      <code>5EhrSbeGeiLgsXcJTXXaBCcqrrMubvWcykSwk4Ho6KUd5sQG</code>
    </div>
  </div>
</main>

<footer>
  <div class="container">
    <p>
      <a href="/">Subnets</a> &middot;
      <a href="/webhooks">Webhooks</a> &middot;
      <a href="/docs">API Docs</a> &middot;
      <a href="https://github.com/ryanmercier/OpenTaoAPI">Source</a> &middot;
      Powered by <a href="https://bittensor.com">Bittensor</a> + MEXC
    </p>
  </div>
</footer>

<script>
const API = '/api/v1';
const $ = s => document.querySelector(s);
const content = $('#content');

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmt(n, d = 4) {
  if (n === 0) return '0';
  if (Math.abs(n) < 0.0001) return n.toExponential(2);
  const s = n.toFixed(d);
  // trim trailing zeros but keep at least 2 decimal places
  const parts = s.split('.');
  if (!parts[1]) return parts[0];
  let dec = parts[1].replace(/0+$/, '');
  if (dec.length < 2) dec = dec.padEnd(2, '0');
  return parts[0] + '.' + dec;
}

function fmtUsd(n) {
  if (n >= 1000) return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
  if (n >= 1) return '$' + n.toFixed(2);
  return '$' + n.toFixed(4);
}

function truncate(s, len = 16) {
  if (!s || s.length <= len) return s || '';
  return s.slice(0, 6) + '...' + s.slice(-4);
}

let sortCol = 'balance_tao';
let sortAsc = false;
let currentData = null;

function render(data) {
  currentData = data;
  const d = data;

  // Build subnet rows + free TAO row
  let rows = d.subnets.map(sn => ({
    netuid: sn.netuid,
    name: sn.name || `SN ${sn.netuid}`,
    symbol: sn.symbol,
    balance: sn.balance_tao,
    balance_alpha: sn.balance_alpha,
    price: sn.price_tao,
    value: sn.value_usd,
    yield_tao: sn.daily_yield_tao,
    yield_usd: sn.daily_yield_usd,
    hotkeys: sn.hotkey_count,
    isFree: false,
  }));

  // Add free TAO as a row
  rows.push({
    netuid: -1,
    name: 'Bittensor',
    symbol: 'τ',
    balance: d.free_balance_tao,
    balance_alpha: d.free_balance_tao,
    price: 1.0,
    value: d.free_balance_tao * d.tao_price_usd,
    yield_tao: 0,
    yield_usd: 0,
    hotkeys: 0,
    isFree: true,
  });

  // Sort
  rows.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (sortAsc) return va > vb ? 1 : va < vb ? -1 : 0;
    return va < vb ? 1 : va > vb ? -1 : 0;
  });

  const sc = col => col === sortCol ? ' class="sorted"' : '';

  content.innerHTML = `
    <div class="portfolio">
      <div class="coldkey-label">${esc(d.coldkey)}</div>
      <div class="balance-row">
        <div class="balance-tao">τ${fmt(d.total_balance_tao)}</div>
        <div class="balance-usd">${fmtUsd(d.total_balance_usd)}</div>
      </div>
      <div class="balance-breakdown">
        <span>Staked τ${fmt(d.total_staked_tao)}</span>
        <span>Free τ${fmt(d.free_balance_tao)}</span>
        <span>TAO/USD ${fmtUsd(d.tao_price_usd)}</span>
      </div>

      <div class="portfolio-chart-card">
        <div class="portfolio-chart-head">
          <span class="portfolio-chart-title">Portfolio value (TAO)</span>
          <div class="portfolio-chart-ranges">
            <button data-hours="24">24h</button>
            <button data-hours="168" class="active">7d</button>
            <button data-hours="720">30d</button>
          </div>
        </div>
        <div id="portfolioChart"></div>
      </div>

      <div class="tokens-header">Tokens ${d.subnet_count + 1}</div>
      <table class="tokens-table">
        <thead>
          <tr>
            <th${sc('name')} data-col="name">Token</th>
            <th${sc('balance')} data-col="balance">Balance</th>
            <th${sc('price')} data-col="price">Price</th>
            <th${sc('value')} data-col="value">Value</th>
            <th${sc('yield_tao')} data-col="yield_tao">Daily Yield</th>
            <th${sc('hotkeys')} data-col="hotkeys">Keys</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr class="${r.isFree ? 'free-row' : ''}">
              <td>
                <div class="token-name">
                  ${r.isFree
                    ? '<span class="sn-badge">TAO</span>'
                    : `<span class="sn-badge">SN ${r.netuid}</span>`}
                  <span class="token-label">${esc(r.name)}</span>
                </div>
              </td>
              <td>τ${fmt(r.balance)}</td>
              <td class="val-dim">τ${fmt(r.price, 3)}</td>
              <td>${fmtUsd(r.value)}</td>
              <td class="${r.yield_tao > 0 ? 'val-green' : 'val-dim'}">${r.yield_tao > 0 ? 'τ' + fmt(r.yield_tao) : '-'}</td>
              <td class="val-dim">${r.isFree ? '-' : r.hotkeys}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;

  // Bind sort handlers
  content.querySelectorAll('.tokens-table th').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) sortAsc = !sortAsc;
      else { sortCol = col; sortAsc = false; }
      render(currentData);
    });
  });

  // Bind range buttons + load initial chart
  content.querySelectorAll('.portfolio-chart-ranges button').forEach(btn => {
    btn.addEventListener('click', () => {
      content.querySelectorAll('.portfolio-chart-ranges button').forEach(b =>
        b.classList.toggle('active', b === btn));
      loadHistoryChart(d.coldkey, parseInt(btn.dataset.hours, 10));
    });
  });
  loadHistoryChart(d.coldkey, 168);
}

let portfolioChart = null;
let portfolioSeries = null;

function ensurePortfolioChart(container) {
  if (portfolioChart && portfolioChart._container === container) return;
  if (portfolioChart) {
    try { portfolioChart.remove(); } catch {}
    portfolioChart = null;
    portfolioSeries = null;
  }
  portfolioChart = LightweightCharts.createChart(container, {
    width: container.clientWidth,
    height: 200,
    layout: { background: { color: '#111' }, textColor: '#c8c8c8' },
    grid: {
      vertLines: { color: '#1a1a1a' },
      horzLines: { color: '#1a1a1a' },
    },
    rightPriceScale: { borderColor: '#1e1e1e' },
    timeScale: { borderColor: '#1e1e1e', timeVisible: true, secondsVisible: false },
    crosshair: { mode: 1 },
    handleScroll: false,
    handleScale: false,
  });
  portfolioChart._container = container;
  portfolioSeries = portfolioChart.addAreaSeries({
    lineColor: '#00d4aa',
    topColor: 'rgba(0, 212, 170, 0.35)',
    bottomColor: 'rgba(0, 212, 170, 0.02)',
    priceFormat: { type: 'price', precision: 4, minMove: 0.0001 },
  });
  window.addEventListener('resize', () => {
    if (portfolioChart && portfolioChart._container) {
      portfolioChart.applyOptions({
        width: portfolioChart._container.clientWidth,
      });
    }
  });
}

async function loadHistoryChart(coldkey, hours) {
  const container = document.getElementById('portfolioChart');
  if (!container) return;
  try {
    const res = await fetch(
      `${API}/portfolio/${encodeURIComponent(coldkey)}/history?hours=${hours}`
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data.points || data.points.length === 0) {
      renderEmptyChart(container, coldkey);
      return;
    }
    ensurePortfolioChart(container);
    const series = data.points
      .map(p => ({
        time: Math.floor(new Date(p.timestamp).getTime() / 1000),
        value: p.total_balance_tao || 0,
      }))
      .filter(p => p.time && p.value >= 0);
    portfolioSeries.setData(series);
    portfolioChart.timeScale().fitContent();
  } catch (e) {
    renderEmptyChart(container, coldkey, e.message);
  }
}

function renderEmptyChart(container, coldkey, errMsg) {
  if (portfolioChart) {
    try { portfolioChart.remove(); } catch {}
    portfolioChart = null;
    portfolioSeries = null;
  }
  container.innerHTML = `
    <div class="portfolio-chart-empty">
      <div>${errMsg ? esc(errMsg) : 'No history yet for this wallet.'}</div>
      <button class="btn btn-sm" id="trackBtn">Track this wallet</button>
    </div>
  `;
  const btn = document.getElementById('trackBtn');
  if (btn) btn.addEventListener('click', () => trackWallet(coldkey, btn));
}

async function trackWallet(coldkey, btn) {
  btn.disabled = true;
  btn.textContent = 'Tracking...';
  try {
    const res = await fetch(`${API}/wallets`, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ coldkey }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }
    btn.textContent = 'Tracking. Snapshots will appear within 5 minutes.';
  } catch (e) {
    btn.disabled = false;
    btn.textContent = `Failed: ${e.message}`;
  }
}

async function lookup(coldkey) {
  content.innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <p>Fetching portfolio data from chain...</p>
      <p style="margin-top:4px;font-size:11px;color:#444">First load may take 15-20s for metagraph sync</p>
    </div>
  `;

  try {
    const res = await fetch(`${API}/portfolio/${coldkey}`);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }
    const data = await res.json();
    render(data);
    // Shareable URL: /portfolio/{coldkey}. pushState so back-button works.
    const target = '/portfolio/' + encodeURIComponent(coldkey);
    if (location.pathname !== target) {
      history.pushState({}, '', target);
    }
  } catch (e) {
    content.innerHTML = `<div class="error-msg">${esc(e.message)}</div>`;
  }
}

// Form submit
$('#searchForm').addEventListener('submit', e => {
  e.preventDefault();
  const ck = $('#coldkeyInput').value.trim();
  if (ck) lookup(ck);
});

// Example coldkey click
document.addEventListener('click', e => {
  if (e.target.tagName === 'CODE' && e.target.closest('.empty-state')) {
    $('#coldkeyInput').value = e.target.textContent;
    lookup(e.target.textContent);
  }
});

// Resolve coldkey from URL: prefer /portfolio/{ck} or /coldkey/{ck}, fall back
// to the legacy /#{ck} hash.
(function bootstrap() {
  let ck = null;
  const p = location.pathname;
  const prefixes = ['/portfolio/', '/coldkey/'];
  for (const prefix of prefixes) {
    if (p.startsWith(prefix)) {
      ck = decodeURIComponent(p.slice(prefix.length));
      break;
    }
  }
  if (!ck && location.hash.length > 1) {
    ck = location.hash.slice(1);
  }
  if (ck) {
    $('#coldkeyInput').value = ck;
    lookup(ck);
  }
})();
</script>

</body>
</html>
