<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Miners — OpenTaoAPI</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --bg-raised: #111;
  --border: #1e1e1e;
  --text: #c8c8c8;
  --text-dim: #666;
  --text-bright: #e8e8e8;
  --accent: #00d4aa;
  --red: #e84855;
  --yellow: #f0c040;
  --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}

/* Header */
header {
  border-bottom: 1px solid var(--border);
  padding: 16px 0;
}

header .inner {
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 600;
  color: var(--text-bright);
  white-space: nowrap;
  letter-spacing: -0.3px;
}

.logo span { color: var(--accent); }

.nav-links {
  display: flex;
  gap: 16px;
  margin-left: auto;
  font-size: 13px;
}

.nav-links a { color: var(--text-dim); }
.nav-links a:hover { color: var(--text); text-decoration: none; }

/* Subnet header */
.subnet-header {
  padding: 24px 0 16px;
  border-bottom: 1px solid var(--border);
}

.subnet-title {
  font-size: 20px;
  font-weight: 600;
  color: var(--text-bright);
  margin-bottom: 4px;
}

.subnet-title .sn-num {
  color: var(--text-dim);
  font-weight: 400;
}

.subnet-meta {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

/* Tab bar */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
}

.tab {
  padding: 10px 20px;
  font-size: 13px;
  color: var(--text-dim);
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: color 0.15s;
}

.tab:hover { color: var(--text); }
.tab.active {
  color: var(--text-bright);
  border-bottom-color: var(--accent);
}

/* Loading / Error */
.loading, .error-msg {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-dim);
}

.loading .spinner {
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }
.error-msg { color: var(--red); }

/* Miners table */
.miners-wrap { padding: 0 0 64px; overflow-x: auto; }

.miners-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 900px;
}

.miners-table th {
  text-align: right;
  font-weight: 400;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  padding: 10px 12px 10px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 1;
}

.miners-table th:first-child,
.miners-table th:nth-child(2),
.miners-table th:nth-child(3),
.miners-table th:nth-child(4),
.miners-table th:nth-child(5) { text-align: left; }

.miners-table th:hover { color: var(--text); }
.miners-table th.sorted { color: var(--accent); }
.miners-table th .arrow { font-size: 9px; margin-left: 2px; }

.miners-table td {
  text-align: right;
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 12px 8px 0;
  border-bottom: 1px solid #141414;
  color: var(--text);
  white-space: nowrap;
}

.miners-table td:first-child,
.miners-table td:nth-child(2),
.miners-table td:nth-child(3),
.miners-table td:nth-child(4),
.miners-table td:nth-child(5) { text-align: left; }

.miners-table tr:hover td { background: #0d0d0d; }

.rank-cell {
  color: var(--text-dim);
  font-size: 11px;
  min-width: 30px;
}

.uid-cell {
  color: var(--text-bright);
  font-weight: 500;
  min-width: 40px;
}

.key-cell {
  color: var(--text-dim);
  font-size: 12px;
}

.key-cell a { color: var(--text-dim); }
.key-cell a:hover { color: var(--accent); }

.key-cell .copy-btn {
  display: inline-block;
  width: 14px;
  height: 14px;
  margin-left: 4px;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.15s;
  vertical-align: middle;
  color: var(--text-dim);
  font-size: 10px;
}

.miners-table tr:hover .copy-btn { opacity: 0.6; }
.copy-btn:hover { opacity: 1 !important; color: var(--accent); }

.ip-cell { color: var(--text-dim); font-size: 11px; }

.incentive-cell { color: var(--text-bright); }
.incentive-zero { color: var(--text-dim); }

.stake-cell { color: var(--text); }
.stake-zero { color: var(--text-dim); }

.emission-cell { color: var(--accent); }
.emission-zero { color: var(--text-dim); }

.usd-cell { color: var(--text); }
.usd-zero { color: var(--text-dim); }

/* Footer */
footer {
  border-top: 1px solid var(--border);
  padding: 16px 0;
  text-align: center;
}

footer p {
  font-size: 11px;
  color: var(--text-dim);
}

footer a { color: var(--text-dim); }
footer a:hover { color: var(--text); }

/* Responsive */
@media (max-width: 768px) {
  .container { padding: 0 12px; }
  .miners-table { font-size: 11px; }
}
</style>
</head>
<body>

<header>
  <div class="container inner">
    <a href="/" class="logo">Open<span>Tao</span>API</a>
    <div class="nav-links">
      <a href="/subnets">Subnets</a>
      <a href="/">Portfolio</a>
      <a href="/docs">API Docs</a>
    </div>
  </div>
</header>

<div class="container">
  <div class="subnet-header" id="subnetHeader" style="display:none">
    <div class="subnet-title">
      <span id="subnetName"></span>
      <span class="sn-num" id="subnetNum"></span>
    </div>
    <div class="subnet-meta" id="subnetMeta"></div>
  </div>

  <div class="tabs">
    <div class="tab" id="tabMiners" data-tab="miners">Miners</div>
    <div class="tab" id="tabValidators" data-tab="validators">Validators</div>
  </div>
</div>

<main class="container">
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading metagraph...</p>
      <p style="margin-top:4px;font-size:11px;color:#444">First load may take 15-20s</p>
    </div>
  </div>
</main>

<footer>
  <div class="container">
    <p>
      <a href="/docs">API Docs</a> &middot;
      <a href="https://github.com">Source</a> &middot;
      Powered by <a href="https://bittensor.com">Bittensor</a>
    </p>
  </div>
</footer>

<script>
const API = '/api/v1';

const pathParts = location.pathname.split('/');
const netuid = parseInt(pathParts[2]);
if (isNaN(netuid)) {
  document.getElementById('content').innerHTML =
    '<div class="error-msg">Invalid subnet. Use /subnet/{netuid}/miners</div>';
}

let activeTab = 'miners';
let currentSort = 'uid';
let currentOrder = 'asc';

function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function truncKey(s) {
  if (!s || s.length <= 12) return s || '';
  return s.slice(0, 4) + '...' + s.slice(-3);
}

function fmt(n, d = 2) {
  if (n === 0) return '0';
  if (Math.abs(n) < 0.00001) return '0';
  if (Math.abs(n) < 0.01) return n.toFixed(5);
  return n.toFixed(d);
}

function fmtPct(n) {
  const pct = n * 100;
  if (pct === 0) return '0.00%';
  if (pct < 0.01) return pct.toFixed(4) + '%';
  return pct.toFixed(2) + '%';
}

function fmtUsd(n) {
  if (n === 0) return '$0';
  if (n < 0.01) return '$' + n.toFixed(4);
  if (n >= 1000) return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
  return '$' + n.toFixed(2);
}

function fmtStake(n) {
  if (n === 0) return '—';
  if (n >= 1000000) return (n / 1000000).toFixed(2) + 'M';
  if (n >= 1000) return n.toLocaleString('en-US', { maximumFractionDigits: 0 });
  return fmt(n);
}

async function copyText(text) {
  try { await navigator.clipboard.writeText(text); } catch {}
}

const sc = col => col === currentSort ? ' class="sorted"' : '';
const arrow = col => {
  if (col !== currentSort) return '';
  return `<span class="arrow">${currentOrder === 'asc' ? '▲' : '▼'}</span>`;
};

function keyCell(key, isColdkey) {
  const safe = esc(key);
  const trunc = esc(truncKey(key));
  const link = isColdkey
    ? `<a href="/#${safe}" title="${safe}">${trunc}</a>`
    : `<span title="${safe}">${trunc}</span>`;
  return `<td class="key-cell">${link}<span class="copy-btn" data-copy="${safe}" title="Copy">⧉</span></td>`;
}

function fmtAlpha(n, sym) {
  if (n === 0) return '0';
  if (n >= 1000) return sym + n.toLocaleString('en-US', { maximumFractionDigits: 2 });
  if (n >= 1) return sym + n.toFixed(2);
  return sym + n.toFixed(4);
}

function fmtTao(n) {
  if (n === 0) return 'τ0';
  if (n >= 1000000) return 'τ' + (n / 1000000).toFixed(2) + 'M';
  if (n >= 1000) return 'τ' + n.toLocaleString('en-US', { maximumFractionDigits: 2 });
  if (n >= 1) return 'τ' + n.toFixed(2);
  return 'τ' + n.toFixed(4);
}

function renderMiners(data) {
  const items = data.miners;
  const sym = data.symbol || 'α';
  const content = document.getElementById('content');

  content.innerHTML = `
    <div class="miners-wrap">
      <table class="miners-table">
        <thead>
          <tr>
            <th style="cursor:default">#</th>
            <th${sc('uid')} data-col="uid">UID${arrow('uid')}</th>
            <th style="cursor:default">Hotkey</th>
            <th style="cursor:default">Coldkey</th>
            <th style="cursor:default">IP</th>
            <th${sc('incentive')} data-col="incentive">Incentive${arrow('incentive')}</th>
            <th${sc('stake')} data-col="stake">${data.subnet_name || 'Alpha'} Stake${arrow('stake')}</th>
            <th${sc('daily_alpha')} data-col="daily_alpha">${sym}/Day${arrow('daily_alpha')}</th>
            <th${sc('daily_usd')} data-col="daily_usd">$/Day${arrow('daily_usd')}</th>
          </tr>
        </thead>
        <tbody>
          ${items.map(m => `
            <tr>
              <td class="rank-cell">${m.rank}</td>
              <td class="uid-cell">${m.uid}</td>
              ${keyCell(m.hotkey, false)}
              ${keyCell(m.coldkey, true)}
              <td class="ip-cell">${m.axon || '—'}</td>
              <td class="${m.incentive > 0 ? 'incentive-cell' : 'incentive-zero'}">${fmtPct(m.incentive)}</td>
              <td class="${m.stake > 0 ? 'stake-cell' : 'stake-zero'}">${fmtStake(m.stake)}</td>
              <td class="${m.daily_alpha > 0 ? 'emission-cell' : 'emission-zero'}">${fmtAlpha(m.daily_alpha, sym)}</td>
              <td class="${m.daily_usd > 0 ? 'usd-cell' : 'usd-zero'}">${fmtUsd(m.daily_usd)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
  bindSort();
}

function renderValidators(data) {
  const items = data.validators;
  const sym = data.symbol || 'α';
  const content = document.getElementById('content');

  content.innerHTML = `
    <div class="miners-wrap">
      <table class="miners-table">
        <thead>
          <tr>
            <th style="cursor:default">#</th>
            <th${sc('uid')} data-col="uid">UID${arrow('uid')}</th>
            <th style="cursor:default">Hotkey</th>
            <th style="cursor:default">Coldkey</th>
            <th${sc('stake')} data-col="stake">${data.subnet_name || 'Alpha'} Stake${arrow('stake')}</th>
            <th style="cursor:default">TAO Stake</th>
            <th style="cursor:default">Total Stake</th>
            <th${sc('vtrust')} data-col="vtrust">VTrust${arrow('vtrust')}</th>
            <th${sc('dividends')} data-col="dividends">Dividends${arrow('dividends')}</th>
            <th${sc('dominance')} data-col="dominance">Dominance${arrow('dominance')}</th>
            <th${sc('daily_alpha')} data-col="daily_alpha">${sym}/Day${arrow('daily_alpha')}</th>
          </tr>
        </thead>
        <tbody>
          ${items.map(v => `
            <tr>
              <td class="rank-cell">${v.rank}</td>
              <td class="uid-cell">${v.uid}</td>
              ${keyCell(v.hotkey, false)}
              ${keyCell(v.coldkey, true)}
              <td class="${v.stake > 0 ? 'stake-cell' : 'stake-zero'}">${fmtAlpha(v.stake, sym)}</td>
              <td class="${v.tao_stake > 0 ? 'stake-cell' : 'stake-zero'}">${fmtTao(v.tao_stake)}</td>
              <td class="stake-cell">${fmtTao(v.total_stake_tao)}</td>
              <td class="${v.vtrust > 0 ? 'incentive-cell' : 'incentive-zero'}">${v.vtrust.toFixed(5)}</td>
              <td class="${v.dividends > 0 ? 'incentive-cell' : 'incentive-zero'}">${v.dividends.toFixed(5)}</td>
              <td class="${v.dominance > 0 ? 'incentive-cell' : 'incentive-zero'}">${v.dominance > 0 ? '+' + v.dominance.toFixed(2) + '%' : '0%'}</td>
              <td class="${v.daily_alpha > 0 ? 'emission-cell' : 'emission-zero'}">${fmtAlpha(v.daily_alpha, sym)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
  bindSort();
}

function bindSort() {
  document.querySelectorAll('.miners-table th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (currentSort === col) {
        currentOrder = currentOrder === 'asc' ? 'desc' : 'asc';
      } else {
        currentSort = col;
        currentOrder = col === 'uid' ? 'asc' : 'desc';
      }
      load();
    });
  });
  // Event delegation for copy buttons
  document.querySelectorAll('.copy-btn[data-copy]').forEach(btn => {
    btn.addEventListener('click', () => copyText(btn.dataset.copy));
  });
}

function updateHeader(data) {
  document.getElementById('subnetHeader').style.display = '';
  document.getElementById('subnetName').textContent = data.subnet_name || `Subnet ${netuid}`;
  document.getElementById('subnetNum').textContent = `SN ${netuid}`;

  const count = activeTab === 'miners'
    ? `Miners: ${data.total_miners}`
    : `Validators: ${data.total_validators}`;

  document.getElementById('subnetMeta').innerHTML = `
    <span>${count}</span>
    <span>Rate: τ${fmt(data.alpha_to_tao_rate, 5)}</span>
    <span>TAO: ${fmtUsd(data.tao_price_usd)}</span>
  `;
  document.title = `${data.subnet_name || 'SN ' + netuid} ${activeTab === 'miners' ? 'Miners' : 'Validators'} — OpenTaoAPI`;
}

function setActiveTab(tab) {
  activeTab = tab;
  currentSort = 'uid';
  currentOrder = 'asc';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab === 'miners' ? 'tabMiners' : 'tabValidators').classList.add('active');
  document.getElementById('content').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading ${tab}...</p>
    </div>
  `;
  load();
}

// Tab click handlers
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => setActiveTab(t.dataset.tab));
});

async function load() {
  try {
    const endpoint = activeTab === 'miners' ? 'miners' : 'validators';
    const url = `${API}/subnet/${netuid}/${endpoint}?sort=${currentSort}&order=${currentOrder}`;
    const res = await fetch(url);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }
    const data = await res.json();
    updateHeader(data);
    if (activeTab === 'miners') renderMiners(data);
    else renderValidators(data);
  } catch (e) {
    document.getElementById('content').innerHTML =
      `<div class="error-msg">${esc(e.message)}</div>`;
  }
}

// Init: set miners tab active
document.getElementById('tabMiners').classList.add('active');
load();
</script>

</body>
</html>
