<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Subnets — OpenTaoAPI</title>
<link rel="stylesheet" href="/static/common.css">
<style>
.container { max-width: 1200px; }
:root { --green: #00d4aa; }
.nav-links { margin-left: auto; }
.nav-links a.active { color: var(--text-bright); }

.summary-bar {
  padding: 20px 0;
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
  align-items: baseline;
  border-bottom: 1px solid var(--border);
}

.summary-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.summary-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
}

.summary-value {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 600;
  color: var(--text-bright);
}

.summary-sub {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-dim);
}

/* Search + tabs */
.toolbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.search-input {
  flex: 1;
  max-width: 360px;
  padding: 7px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text-bright);
  font-family: var(--sans);
  font-size: 13px;
  outline: none;
}

.search-input::placeholder { color: #444; }
.search-input:focus { border-color: #333; }

.count-badge {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  background: rgba(0, 212, 170, 0.08);
  border: 1px solid rgba(0, 212, 170, 0.15);
  padding: 2px 8px;
  margin-left: auto;
}

/* Loading / Error */
.loading, .error-msg {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-dim);
}

.loading .spinner {
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }


/* Subnets table */
.table-wrap { padding: 0 0 64px; overflow-x: auto; }

.subnets-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1000px;
}

.subnets-table th {
  text-align: right;
  font-weight: 400;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  padding: 10px 16px 10px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 1;
}

.subnets-table th:first-child { text-align: center; width: 40px; }
.subnets-table th:nth-child(2) { text-align: left; }

.subnets-table th:hover { color: var(--text); }
.subnets-table th.sorted { color: var(--accent); }
.subnets-table th .arrow { font-size: 9px; margin-left: 2px; }

.subnets-table td {
  text-align: right;
  font-family: var(--mono);
  font-size: 12px;
  padding: 10px 16px 10px 0;
  border-bottom: 1px solid #141414;
  color: var(--text);
  white-space: nowrap;
}

.subnets-table td:first-child {
  text-align: center;
  color: var(--text-dim);
  font-size: 11px;
}

.subnets-table td:nth-child(2) { text-align: left; }

.subnets-table tbody tr { cursor: pointer; }
.subnets-table tbody tr:hover td { background: #0d0d0d; }

/* Subnet name cell */
.subnet-name-cell {
  display: flex;
  align-items: center;
  gap: 8px;
}

.sn-badge {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  background: var(--bg-raised);
  border: 1px solid var(--border);
  padding: 1px 5px;
  min-width: 42px;
  text-align: center;
}

.subnet-label {
  font-family: var(--sans);
  font-size: 13px;
  color: var(--text-bright);
  font-weight: 500;
}

/* Values */
.emission-cell { color: var(--text); }
.emission-zero { color: var(--text-dim); }
.price-cell { color: var(--text-bright); }
.mcap-cell { color: var(--text); }
.volume-cell { color: var(--text-dim); }
.supply-cell { color: var(--text-dim); font-size: 11px; }

/* Footer */

@media (max-width: 768px) {
  .container { padding: 0 12px; }
  .summary-bar { gap: 20px; }
  .summary-value { font-size: 16px; }
}
</style>
</head>
<body>

<header>
  <div class="container inner">
    <a href="/" class="logo">Open<span>Tao</span>API</a>
    <div class="nav-links">
      <a href="/subnets" class="active">Subnets</a>
      <a href="/">Portfolio</a>
      <a href="/docs">API Docs</a>
    </div>
  </div>
</header>

<div class="container">
  <div class="summary-bar" id="summaryBar" style="display:none">
    <div class="summary-stat">
      <div class="summary-label">Sum of Subnet Prices</div>
      <div class="summary-value" id="sumPrices"></div>
      <div class="summary-sub" id="sumPricesUsd"></div>
    </div>
    <div class="summary-stat">
      <div class="summary-label">Total Subnets</div>
      <div class="summary-value" id="totalSubnets"></div>
    </div>
    <div class="summary-stat">
      <div class="summary-label">TAO Price</div>
      <div class="summary-value" id="taoPrice"></div>
    </div>
  </div>

  <div class="toolbar">
    <input type="text" class="search-input" id="searchInput" placeholder="Search by Subnet Name or Number">
    <div class="count-badge" id="countBadge"></div>
  </div>
</div>

<main class="container">
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading subnets...</p>
    </div>
  </div>
</main>

<footer>
  <div class="container">
    <p>
      <a href="/docs">API Docs</a> &middot;
      <a href="https://github.com/ryanmercier/OpenTaoAPI">Source</a> &middot;
      Powered by <a href="https://bittensor.com">Bittensor</a>
    </p>
  </div>
</footer>

<script>
const API = '/api/v1';

let currentSort = 'market_cap';
let currentOrder = 'desc';
let allData = null;
let filterText = '';

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmtTao(n) {
  if (n >= 1000000) return 'τ' + (n / 1000000).toFixed(2) + 'M';
  if (n >= 1000) return 'τ' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
  if (n >= 1) return 'τ' + n.toFixed(2);
  if (n >= 0.001) return 'τ' + n.toFixed(5);
  if (n > 0) return 'τ' + n.toFixed(8);
  return 'τ0';
}

function fmtUsd(n) {
  if (n >= 1000000) return '$' + (n / 1000000).toFixed(2) + 'M';
  if (n >= 1000) return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
  if (n >= 1) return '$' + n.toFixed(2);
  return '$' + n.toFixed(4);
}

function fmtSupply(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(2) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return n.toFixed(0);
}

function fmtPct(n) {
  if (n === 0) return '0.00%';
  return n.toFixed(2) + '%';
}

function updateSummary(data) {
  document.getElementById('summaryBar').style.display = '';
  document.getElementById('sumPrices').textContent = 'τ' + data.sum_subnet_prices.toFixed(2);
  document.getElementById('sumPricesUsd').textContent = fmtUsd(data.sum_subnet_prices_usd);
  document.getElementById('totalSubnets').textContent = data.total_subnets;
  document.getElementById('taoPrice').textContent = fmtUsd(data.tao_price_usd);
}

function renderTable(data) {
  allData = data;
  let subnets = data.subnets;

  // Filter
  if (filterText) {
    const q = filterText.toLowerCase();
    subnets = subnets.filter(s =>
      s.name.toLowerCase().includes(q) ||
      String(s.netuid).includes(q) ||
      ('sn ' + s.netuid).includes(q)
    );
  }

  document.getElementById('countBadge').textContent = subnets.length;

  const content = document.getElementById('content');
  const sc = col => col === currentSort ? ' class="sorted"' : '';
  const arrow = col => {
    if (col !== currentSort) return '';
    return `<span class="arrow">${currentOrder === 'asc' ? '▲' : '▼'}</span>`;
  };

  content.innerHTML = `
    <div class="table-wrap">
      <table class="subnets-table">
        <thead>
          <tr>
            <th${sc('netuid')} data-col="netuid">#${arrow('netuid')}</th>
            <th${sc('name')} data-col="name">Subnet${arrow('name')}</th>
            <th${sc('emission')} data-col="emission">Emission${arrow('emission')}</th>
            <th${sc('price')} data-col="price">Price${arrow('price')}</th>
            <th${sc('market_cap')} data-col="market_cap">Market Cap${arrow('market_cap')}</th>
            <th${sc('volume')} data-col="volume">24H Volume${arrow('volume')}</th>
            <th${sc('supply')} data-col="supply">Circulating Supply${arrow('supply')}</th>
          </tr>
        </thead>
        <tbody>
          ${subnets.map((s, i) => `
            <tr data-netuid="${s.netuid}">
              <td>${filterText ? i + 1 : s.rank}</td>
              <td>
                <div class="subnet-name-cell">
                  <span class="sn-badge">SN ${s.netuid}</span>
                  <span class="subnet-label">${esc(s.name)}</span>
                </div>
              </td>
              <td class="${s.emission_pct > 0 ? 'emission-cell' : 'emission-zero'}">${fmtPct(s.emission_pct)}</td>
              <td class="price-cell">${s.netuid === 0 ? 'τ1' : fmtTao(s.price)}</td>
              <td class="mcap-cell">${fmtTao(s.market_cap_tao)}</td>
              <td class="volume-cell">${s.volume_tao > 0 ? fmtTao(s.volume_tao) : '—'}</td>
              <td class="supply-cell">${fmtSupply(s.supply)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;

  // Sort handlers
  content.querySelectorAll('.subnets-table th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (currentSort === col) {
        currentOrder = currentOrder === 'asc' ? 'desc' : 'asc';
      } else {
        currentSort = col;
        currentOrder = (col === 'netuid' || col === 'name') ? 'asc' : 'desc';
      }
      // Client-side re-sort, no re-fetch needed
      const key = {netuid:'netuid',name:'name',price:'price',market_cap:'market_cap_tao',emission:'emission_pct',supply:'supply',volume:'volume_tao'}[currentSort] || 'market_cap_tao';
      const rev = currentOrder === 'desc';
      allData.subnets.sort((a,b) => {
        const va = a[key], vb = b[key];
        if (typeof va === 'string') return rev ? vb.localeCompare(va) : va.localeCompare(vb);
        return rev ? vb - va : va - vb;
      });
      allData.subnets.forEach((s,i) => s.rank = i + 1);
      renderTable(allData);
    });
  });

  // Row click → miners page
  content.querySelectorAll('.subnets-table tbody tr').forEach(tr => {
    tr.addEventListener('click', () => {
      const nuid = tr.dataset.netuid;
      if (nuid !== undefined) location.href = `/subnet/${nuid}/miners`;
    });
  });
}

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  filterText = e.target.value.trim();
  if (allData) renderTable(allData);
});

async function load() {
  try {
    const url = `${API}/subnets?sort=${currentSort}&order=${currentOrder}`;
    const res = await fetch(url);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }
    const data = await res.json();
    updateSummary(data);
    renderTable(data);
  } catch (e) {
    document.getElementById('content').innerHTML =
      `<div class="error-msg">${esc(e.message)}</div>`;
  }
}

load();
</script>

</body>
</html>
